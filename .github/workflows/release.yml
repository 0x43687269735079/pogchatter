# Release pipeline. To publish a version: bump `version` in package.json on main, then push a
# matching tag (`git tag v0.2.0 && git push origin v0.2.0`). The tag build re-runs the quality
# gates, packages every supported target (win x64/arm64 NSIS+zip, mac arm64 dmg, linux x64/arm64
# AppImage — see electron-builder.yml), and attaches everything to a DRAFT GitHub release for
# review; publishing the release stays a manual click.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      # No dependency cache here on purpose: release artifacts must not be poisonable via a
      # shared Actions cache (zizmor: cache-poisoning).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          package-manager-cache: false
      - name: Tag matches package.json version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version=$(node -p "require('./package.json').version")
          if [ "v$version" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version v$version — bump the version first"
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test

  build:
    needs: checks
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: --win
          - os: macos-latest
            target: --mac
          - os: ubuntu-latest
            target: --linux
    runs-on: ${{ matrix.os }}
    env:
      # NSIS payloads need the BCJ2 filter (see electron-builder.yml); harmless elsewhere.
      ELECTRON_BUILDER_7Z_FILTER: BCJ2
      # macOS: skip certificate discovery so electron-builder ad-hoc signs (see the mac section
      # of electron-builder.yml). Harmless on the other platforms.
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      # No dependency cache here on purpose: release artifacts must not be poisonable via a
      # shared Actions cache (zizmor: cache-poisoning).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      # The package.json build:* scripts use sh env-prefix syntax, which Windows' script shell
      # can't parse — run the same two steps directly so one invocation works on every OS.
      - run: pnpm exec electron-vite build
      - run: pnpm exec electron-builder ${{ matrix.target }} --publish never
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          cd dist
          sha256sum -- * > SHA256SUMS.txt
          gh release create "$TAG" --repo "$REPO" --draft --generate-notes \
            --title "Pogchatter $TAG" -- *
