<?xml version="1.0" encoding="UTF-8"?>
<!-- Pogchatter app icon (source). Terminal-prompt motif in the app palette; rasterize to
     icon.png (1024x1024) with: qlmanage -t -s 1024 -o build build/icon.svg && mv build/icon.svg.png build/icon.png -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- macOS-style rounded tile in the app background colour, with a subtle rule-coloured edge -->
  <rect x="64" y="64" width="896" height="896" rx="196" fill="#242933"/>
  <rect x="76" y="76" width="872" height="872" rx="184" fill="none" stroke="#3b4252" stroke-width="16"/>
  <!-- terminal prompt chevron -->
  <polyline points="332,360 532,512 332,664" fill="none" stroke="#88c0d0" stroke-width="88"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- block cursor at the prompt -->
  <rect x="600" y="586" width="168" height="86" rx="10" fill="#e8b339"/>
</svg>
